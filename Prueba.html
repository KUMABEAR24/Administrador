<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test API</title>
</head>
<body>

<h1>Prueba API MORITA</h1>
<pre id="out">Cargando...</pre>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzZJOVbXEx7KZSrmCojden27M5hpNGSGlmMAgn_HsTQ_pDqV-bNq1TxziFR6FqnJZnB/exec";

fetch(GAS_URL + "?action=config")
  .then(r => r.json())
  .then(d => {
    document.getElementById("out").textContent =
      JSON.stringify(d, null, 2);
  })
  .catch(e => {
    document.getElementById("out").textContent = "ERROR: " + e;
  });
</script>

</body>
</html>
